name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore StepWind.slnx

      - name: Build
        run: dotnet build StepWind.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/StepWind.Core.Tests/StepWind.Core.Tests.csproj -c Release --no-build --verbosity normal

      - name: Publish (win-x64)
        run: ./build/publish.ps1 -Runtime win-x64
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh

      - name: Build installer
        run: iscc installer\stepwind.iss
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: StepWind-setup
          path: installer/Output/*.exe
