name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Least-privilege by default; the release job opts into contents:write to publish assets.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest
    permissions:
      contents: write # create/attach release assets when building a tag
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore StepWind.slnx

      - name: Build
        run: dotnet build StepWind.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/StepWind.Core.Tests/StepWind.Core.Tests.csproj -c Release --no-build --verbosity normal

      - name: Publish (win-x64)
        run: ./build/publish.ps1 -Runtime win-x64
        shell: pwsh

      - name: MCP stdio smoke test
        run: ./build/mcp-smoke.ps1 -Exe dist/win-x64/StepWind.Mcp.exe
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh

      - name: Build installer
        run: iscc installer\stepwind.iss
        shell: pwsh

      # SHA256SUMS.txt is what the in-app updater verifies a download against (filename-matched),
      # so a release MUST ship it — the app refuses to update without it. Generated here so it
      # always matches the exact artifact this run built.
      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $out = "installer/Output"
          Get-ChildItem "$out/*.exe" | ForEach-Object {
            $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$h *$($_.Name)"
          } | Set-Content "$out/SHA256SUMS.txt" -Encoding ascii
          Get-Content "$out/SHA256SUMS.txt"

      - name: Upload installer (CI artifact)
        uses: actions/upload-artifact@v4
        with:
          name: StepWind-setup
          path: |
            installer/Output/*.exe
            installer/Output/SHA256SUMS.txt

      # On a version tag, publish the installer + checksums as a GitHub Release so the in-app
      # updater (and winget) can find them. If/when SignPath signing is wired in, the signing
      # step slots in right before this and the same SHA256SUMS covers the signed binary.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/*.exe
            installer/Output/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
