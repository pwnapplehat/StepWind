name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Least-privilege by default; the release job opts into contents:write to publish assets.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest
    permissions:
      contents: write # create/attach release assets when building a tag
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore StepWind.slnx

      - name: Build
        run: dotnet build StepWind.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/StepWind.Core.Tests/StepWind.Core.Tests.csproj -c Release --no-build --verbosity normal

      - name: Publish (win-x64)
        run: ./build/publish.ps1 -Runtime win-x64
        shell: pwsh

      - name: MCP stdio smoke test
        run: ./build/mcp-smoke.ps1 -Exe dist/win-x64/StepWind.Mcp.exe
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh

      - name: Build installer
        run: iscc installer\stepwind.iss
        shell: pwsh

      # Upload the (as-built) installer as a CI artifact. Its id feeds the optional signing step.
      - name: Upload installer (CI artifact)
        id: upload_installer
        uses: actions/upload-artifact@v4
        with:
          name: StepWind-setup
          path: installer/Output/*.exe

      # Code signing via the FREE SignPath Foundation OSS program. Skipped unless the repo opted in
      # (vars.ENABLE_SIGNING == 'true') and the SignPath project/token are configured — see
      # docs/signing/SignPath-application.md. It signs the artifact uploaded above and writes the
      # SIGNED installer back into installer/Output, so the checksums + release below cover it.
      - name: Sign installer (SignPath)
        if: ${{ startsWith(github.ref, 'refs/tags/v') && vars.ENABLE_SIGNING == 'true' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload_installer.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: installer/Output

      # SHA256SUMS.txt is what the in-app updater verifies a download against (filename-matched),
      # so a release MUST ship it — the app refuses to update without it. Computed AFTER signing so
      # it matches the exact (signed, when enabled) artifact that ships.
      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $out = "installer/Output"
          Get-ChildItem "$out/*.exe" | ForEach-Object {
            $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$h *$($_.Name)"
          } | Set-Content "$out/SHA256SUMS.txt" -Encoding ascii
          Get-Content "$out/SHA256SUMS.txt"

      # On a version tag, publish the installer + checksums as a GitHub Release so the in-app
      # updater (and winget) can find them.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/*.exe
            installer/Output/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ARM64 installer, cross-compiled on the x64 runner and attached to the same release. Tests +
  # smoke run in the x64 job above (they can't execute arm64 here); this job just produces the
  # arm64 artifact so ARM users get a native build (the updater picks it by architecture).
  arm64-installer:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Publish (win-arm64)
        run: ./build/publish.ps1 -Runtime win-arm64
        shell: pwsh
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh
      - name: Build ARM64 installer
        run: iscc /DArch=arm64 installer\stepwind.iss
        shell: pwsh
      # Merge the arm64 hash INTO the release's existing SHA256SUMS.txt (published by the x64 job),
      # so the single sums file the updater fetches has a line for BOTH installers.
      - name: Merge ARM64 hash into SHA256SUMS.txt
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $out = "installer/Output"
          gh release download "${{ github.ref_name }}" -p SHA256SUMS.txt -D $out --clobber
          Get-ChildItem "$out/*arm64-setup.exe" | ForEach-Object {
            $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            Add-Content "$out/SHA256SUMS.txt" "$h *$($_.Name)"
          }
          Get-Content "$out/SHA256SUMS.txt"
      - name: Attach ARM64 installer + merged sums to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/*arm64-setup.exe
            installer/Output/SHA256SUMS.txt
          fail_on_unmatched_files: true
